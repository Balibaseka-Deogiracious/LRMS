<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <!-- Premium blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7fd7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3a5fa8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#254194;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#254194;stop-opacity:0" />
    </radialGradient>
    
    <!-- Premium shadow -->
    <filter id="premiumShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.35" flood-color="#000000"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.4" flood-color="#ffc107"/>
    </filter>
    
    <!-- Inner light effect -->
    <filter id="innerLight">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="120" cy="120" r="115" fill="url(#bgGlow)"/>
  <circle cx="120" cy="120" r="112" fill="none" stroke="#254194" stroke-width="1" opacity="0.15"/>
  
  <!-- Main logo group -->
  <g>
    <!-- Left bars - decreasing height -->
    <g filter="url(#premiumShadow)">
      <!-- Bar 1 -->
      <rect x="35" y="125" width="16" height="50" fill="url(#blueGrad)" rx="3"/>
      <rect x="35" y="125" width="6" height="50" fill="#ffffff" opacity="0.25" rx="2" filter="url(#innerLight)"/>
      
      <!-- Bar 2 -->
      <rect x="57" y="105" width="16" height="70" fill="url(#blueGrad)" rx="3"/>
      <rect x="57" y="105" width="6" height="70" fill="#ffffff" opacity="0.25" rx="2" filter="url(#innerLight)"/>
    </g>
    
    <!-- Center gold bar - HERO ELEMENT -->
    <g filter="url(#softGlow)">
      <rect x="79" y="50" width="20" height="125" fill="url(#goldGrad)" rx="4"/>
      <rect x="79" y="50" width="8" height="125" fill="#ffffff" opacity="0.4" rx="3" filter="url(#innerLight)"/>
      <!-- Decorative accent on top -->
      <circle cx="89" cy="45" r="4" fill="url(#goldGrad)"/>
    </g>
    
    <!-- Right bars - varying height -->
    <g filter="url(#premiumShadow)">
      <!-- Bar 3 -->
      <rect x="105" y="80" width="16" height="95" fill="url(#blueGrad)" rx="3"/>
      <rect x="105" y="80" width="6" height="95" fill="#ffffff" opacity="0.25" rx="2" filter="url(#innerLight)"/>
      
      <!-- Bar 4 -->
      <rect x="127" y="100" width="16" height="75" fill="url(#blueGrad)" rx="3"/>
      <rect x="127" y="100" width="6" height="75" fill="#ffffff" opacity="0.25" rx="2" filter="url(#innerLight)"/>
      
      <!-- Bar 5 -->
      <rect x="149" y="125" width="16" height="50" fill="url(#blueGrad)" rx="3"/>
      <rect x="149" y="125" width="6" height="50" fill="#ffffff" opacity="0.25" rx="2" filter="url(#innerLight)"/>
      
      <!-- Bar 6 - tall accent -->
      <rect x="171" y="75" width="16" height="100" fill="url(#blueGrad)" rx="3"/>
      <rect x="171" y="75" width="6" height="100" fill="#ffffff" opacity="0.25" rx="2" filter="url(#innerLight)"/>
    </g>
  </g>
  
  <!-- Connecting lines for digital feel -->
  <g stroke="#254194" stroke-width="0.8" opacity="0.12">
    <path d="M 30 100 Q 120 90 190 100" fill="none"/>
    <path d="M 30 160 Q 120 170 190 160" fill="none"/>
  </g>
  
  <!-- Decorative dots (connection points) -->
  <g fill="#ffc107" opacity="0.4">
    <circle cx="50" cy="155" r="1.5"/>
    <circle cx="89" cy="165" r="1.5"/>
    <circle cx="160" cy="155" r="1.5"/>
  </g>
  
  <!-- Base line -->
  <line x1="35" y1="180" x2="205" y2="180" stroke="#254194" stroke-width="2" opacity="0.2"/>
  
  <!-- Text - LIBRIS -->
  <text x="120" y="205" font-family="'Segoe UI', 'Arial', sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#254194" letter-spacing="2">
    LIBRIS
  </text>
  
  <!-- Tagline -->
  <text x="120" y="221" font-family="'Segoe UI', 'Arial', sans-serif" font-size="9" font-weight="400" text-anchor="middle" fill="#254194" opacity="0.6" letter-spacing="0.5">
    LIBRARY MANAGEMENT
  </text>
</svg>
